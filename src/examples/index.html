<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metanet i18n Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .lang-switcher { padding: 0.5rem; font-size: 1rem; }
    [data-i18n] { margin: 0.25rem 0; }
    nav { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; }
  </style>
</head>
<body>

  <!-- Language switcher mount point -->
  <nav id="lang-switcher-mount"></nav>

  <!-- Translated elements using data-i18n attribute -->
  <h1 data-i18n="home.heroTitle"></h1>
  <p data-i18n="home.heroSubtitle"></p>

  <section>
    <h2 data-i18n="about.title"></h2>
    <p data-i18n="about.description"></p>
  </section>

  <section>
    <h2 data-i18n="services.title"></h2>
    <ul>
      <li data-i18n="services.consulting"></li>
      <li data-i18n="services.development"></li>
      <li data-i18n="services.support"></li>
      <li data-i18n="services.training"></li>
    </ul>
  </section>

  <section>
    <h2 data-i18n="contact.title"></h2>
    <form>
      <div>
        <label data-i18n="contact.formName"></label><br/>
        <input type="text" data-i18n="contact.formName" data-i18n-attr="placeholder" />
      </div>
      <div>
        <label data-i18n="contact.formEmail"></label><br/>
        <input type="email" data-i18n="contact.formEmail" data-i18n-attr="placeholder" />
      </div>
      <div>
        <label data-i18n="contact.formMessage"></label><br/>
        <textarea data-i18n="contact.formMessage" data-i18n-attr="placeholder" rows="3"></textarea>
      </div>
      <button type="submit" data-i18n="contact.send" data-i18n-attr="title"></button>
    </form>
  </section>

  <!--
    Wire everything: init i18n → apply document locale → mount switcher → bind DOM.
    This script would be generated by your bundler (esbuild, rollup, tsc, etc.)
    pointing to src/examples/browser-demo.ts or a bundled equivalent.
  -->
  <!--
  <script type="module">
    import { browserDemo } from './dist/browser-demo.js';
    browserDemo().then(cleanup => {
      // cleanup() called on page unload if needed
    });
  </script>
  -->

</body>
</html>
